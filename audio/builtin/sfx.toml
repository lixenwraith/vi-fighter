# Rotary cue. Pitch leads, amplitude trails by 90 degrees: vibrato phase 0.25
# is cos, am phase 0.5 flips the sine. In-phase modulation reads as a flat
# wobble. The two partials are two layers, which is what partials are.
[[sound]]
name = "ring"
duration = 0.7
norm = 0.85
chain = [
  { kind = "bp", freq = 1600, q = 0.8, track_pitch = true },
  { kind = "ar", attack = 0.008, release = 0.26 }
]
[[sound.layer]]
source = { kind = "osc", wave = "sine", freq = 660, vibrato = { rate = 2.5, depth = 0.06, phase = 0.25 } }
chain = [{ kind = "am", rate = 2.5, depth = 0.55, phase = 0.5 }]
[[sound.layer]]
gain = 0.45
source = { kind = "osc", wave = "sine", freq = 990, vibrato = { rate = 2.5, depth = 0.06, phase = 0.25 } }
chain = [{ kind = "am", rate = 2.5, depth = 0.55, phase = 0.5 }]

