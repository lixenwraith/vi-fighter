source = { kind = "fm", freq = 110, ratio = 0.5, index = 3.0 }
chain = [{ kind = "am", rate = 12.5, depth = 0.4 }]

# The band-passed copy must be the same spark realization, not a redraw:
# that is what ref is for.
[[sound]]
name = "crackle"
duration = 0.08
norm = 0.9
chain = [
  { kind = "clip", drive = 5.0 },
  { kind = "decay", attack = 0.001, tau = 0.03 }
]
[[sound.layer]]
name = "sparks"
source = { kind = "impulse", density = 0.002 }
chain = [{ kind = "hp", freq = 1500, q = 0.707 }]
[[sound.layer]]
gain = 0.8
source = { kind = "ref", ref = "sparks" }
chain = [{ kind = "bp", freq = 3500, q = 4.0, track_pitch = true }]

# index_curve = "quad" is 5*(1-t^2): the inharmonic FM index decay that was a
# hand-written per-sample loop.
[[sound]]
