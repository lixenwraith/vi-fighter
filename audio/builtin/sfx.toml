# Built-in sound effects. Times are seconds, frequencies Hz.
# Table headers are flush-left deliberately; chains use inline tables, but the
# block form ([[sound.layer.chain]]) parses to the same array.

[[sound]]
name = "error"
duration = 0.08
fixed_length = true
norm = 0.9
[[sound.layer]]
source = { kind = "sweep", wave = "saw", freq = 130, freq_end = 85 }
chain = [
  { kind = "lp", freq = 900, q = 0.9 },
  { kind = "ar", attack = 0.005, release = 0.02 }
]

# Three partials, upper slightly stretched: the beating is the shimmer.
[[sound]]
name = "bell"
duration = 0.35
norm = 0.9
[[sound.layer]]
source = { kind = "osc", wave = "sine", freq = 880 }
chain = [{ kind = "ar", attack = 0.004, release = 0.32 }]
[[sound.layer]]
gain = 0.35
source = { kind = "osc", wave = "sine", freq = 1765.28 }
chain = [{ kind = "ar", attack = 0.004, release = 0.14 }]
[[sound.layer]]
gain = 0.18
source = { kind = "osc", wave = "sine", freq = 2637 }
chain = [{ kind = "decay", attack = 0.002, tau = 0.05 }]

[[sound]]
name = "whoosh"
duration = 0.12
norm = 0.8
[[sound.layer]]
source = { kind = "noise" }
chain = [
  { kind = "sweepbp", freq = 500, freq_end = 2600, q = 1.2, track_pitch = true },
  { kind = "am", rate = 13.0, depth = 0.35 },
  { kind = "ar", attack = 0.015, release = 0.07 }
]

# Two notes in sequence: offset replaces concatenation.
[[sound]]
name = "coin"
norm = 0.85
chain = [{ kind = "lp", freq = 6000, q = 0.707 }]
[[sound.layer]]
length = 0.08
source = { kind = "osc", wave = "square", freq = 987.77 }
chain = [{ kind = "ar", attack = 0.005, release = 0.04 }]
[[sound.layer]]
offset = 0.08
length = 0.16
source = { kind = "osc", wave = "square", freq = 1318.51 }
chain = [{ kind = "ar", attack = 0.005, release = 0.11 }]

# The one preset that needs a bus: overdrive is nonlinear and must see the
# sweep+sub sum, but not the noise texture.
[[sound]]
name = "shield"
duration = 0.10
fixed_length = true
norm = 0.95
chain = [{ kind = "ar", attack = 0.002, release = 0.08 }]
[[sound.bus]]
name = "body"
chain = [
  { kind = "clip", drive = 2.5 },
  { kind = "lp", freq = 400, q = 1.0 }
]
[[sound.layer]]
bus = "body"
source = { kind = "sweep", wave = "sine", freq = 160, freq_end = 40 }
[[sound.layer]]
bus = "body"
gain = 0.6
source = { kind = "sweep", wave = "sine", freq = 80, freq_end = 40 }
[[sound.layer]]
gain = 0.2
length = 0.04
source = { kind = "noise" }
chain = [
  { kind = "bp", freq = 800, q = 2.0 },
  { kind = "ar", attack = 0.005, release = 0.03 }
]

[[sound]]
name = "zap"
