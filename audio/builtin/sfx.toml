norm = 0.85
chain = [
  { kind = "shape", drive = 1.5 },
  { kind = "ar", attack = 0.005, release = 0.03 }
]
[[sound.layer]]
source = { kind = "noise" }
chain = [
  { kind = "bp", freq = 1200, q = 1.0, track_pitch = true },
  { kind = "am", rate = 25.0, depth = 0.8 }
]
[[sound.layer]]
